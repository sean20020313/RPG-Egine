<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RPG Adventure</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true"></div>

  <main class="wrap">
    <header class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div class="brand-text">
        <h1>RPG Adventure</h1>
        <p class="brand-tag">HD-2D · One Hero · One Story</p>
      </div>
    </header>

    <section class="glass setup" id="setup">
      <h2 class="panel-title">Choose Your Hero</h2>
      <p class="panel-hint">Each class has a unique look and story. Pick one hero for this adventure.</p>
      <div class="setup-inner setup-class">
        <div class="class-grid" id="class-grid">
          <button type="button" class="class-pick on" data-job="warrior">
            <canvas class="class-preview" width="72" height="72" aria-hidden="true"></canvas>
            <span class="class-name">Warrior</span>
            <span class="class-hero-name">Aldric</span>
          </button>
          <button type="button" class="class-pick" data-job="mage">
            <canvas class="class-preview" width="72" height="72" aria-hidden="true"></canvas>
            <span class="class-name">Mage</span>
            <span class="class-hero-name">Lyra</span>
          </button>
          <button type="button" class="class-pick" data-job="priest">
            <canvas class="class-preview" width="72" height="72" aria-hidden="true"></canvas>
            <span class="class-name">Priest</span>
            <span class="class-hero-name">Elara</span>
          </button>
          <button type="button" class="class-pick" data-job="thief">
            <canvas class="class-preview" width="72" height="72" aria-hidden="true"></canvas>
            <span class="class-name">Thief</span>
            <span class="class-hero-name">Kade</span>
          </button>
        </div>
        <div class="setup-story" id="setup-story">
          <h3 class="story-title" id="setup-story-title">Oath of the Fallen Fort</h3>
          <p class="story-intro" id="setup-story-intro"></p>
        </div>
        <div class="setup-actions">
          <button type="button" id="btnNew" class="btn-text btn-primary">New Game</button>
          <button type="button" id="btnResume" class="btn-text btn-secondary">Continue</button>
          <button type="button" id="btnClearSave" class="btn-text btn-danger">Clear Save</button>
        </div>
      </div>
    </section>

    <section class="glass game-root hidden" id="game">
      <nav class="hud-pills hud-minimal">
        <button type="button" id="btn-home" class="pill pill-btn">Home</button>
        <button type="button" id="btn-restart" class="pill pill-btn">Restart</button>
      </nav>

      <div class="layout">
        <aside class="rail" id="rail-story">
          <h2 class="rail-title">Story</h2>
          <p class="story-chapter" id="story-title">—</p>
          <p class="story-intro" id="story-intro">—</p>
          <h3 class="rail-sub">Quests</h3>
          <div id="quest-list" class="quest-list"></div>
          <h2 class="rail-title rail-hero-head">Hero</h2>
          <div id="party-list" class="party-list"></div>
        </aside>

        <div class="stage-wrap">
          <div id="scene-explore" class="stage stage-explore">
            <div class="map-frame hd2d-frame">
              <canvas id="world-canvas" class="world-canvas" width="480" height="320" aria-label="Game map"></canvas>
            </div>
            <p class="map-hint">Move: WASD / arrows · Attack (adjacent): Attack or Space</p>
            <div class="map-controls">
              <div class="dpad" id="dpad">
                <button type="button" class="dpad-btn d-up" data-dir="up">Up</button>
                <button type="button" class="dpad-btn d-left" data-dir="left">Left</button>
                <span class="dpad-spacer" aria-hidden="true"></span>
                <button type="button" class="dpad-btn d-right" data-dir="right">Right</button>
                <button type="button" class="dpad-btn d-down" data-dir="down">Down</button>
              </div>
              <button type="button" id="btn-map-atk" class="map-atk-btn">Attack</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="fx-layer" class="fx-layer" aria-hidden="true"></div>

  <script src="./stories.js?v=6"></script>
  <script src="./engine.js?v=6"></script>
  <script src="./world.js?v=6"></script>
  <script src="./app.js?v=6"></script>
</body>
</html>
